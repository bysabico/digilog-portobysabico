<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lilita+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Link CDN Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Link CSS bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- LINK CSS Style -->
    <link rel="stylesheet" href="../navbar/navbar-digilog-style.css">
    <link rel="stylesheet" href="../footer/footer-digilog-style.css">
    <link rel="stylesheet" href="main-digilog-style.css">

    <!-- title portofolio 1: Jam Digilog -->
    <title>JAM DIGILOG</title>
</head>
<body class="d-flex flex-column min-vh-100" id="main-jam-digilog">

    <!-- navbar -->
    <div id="navbar-container">
        <!-- space untuk memasukkan navbar -->
    </div>

    <main class="wrapper flex-grow-1 d-flex flex-column mt-5 p-5 justify-content-center align-items-center overflow-auto">
        <header class="text-center">
            <h1 id="greeting" class="fw-bold fs-1"></h1>
            <div class="dateDisplay fs-2 text-right" id="date">DD:MM:YYYY</div>
            
            <!-- input hidden -->
            <input type="text" id="calendarInput">
        </header>

        <!-- containerDateTime -->
        <div class="containerDateTime">
            <!-- digital mode -->
            <div class="timeDisplay text-center fw-bold my-5" id="digitalClock">00:00:00</div>

            <!-- analog mode -->
            <div class="analog-container mb-5">
                <div class="wrapper-analog mt-5 mb-5" id="analogClock">
                    <div class="bar-seconds"></div>
                    <div class="number-hours"></div>
                    <div class="hands-box">
                        <div class="hand hours"><i></i></div>
                        <div class="hand minutes"><i></i></div>
                        <div class="hand seconds"><i></i></div>
                    </div>
                </div>
            </div>

            <!-- Input Section -->
            <div class="mainBtn d-flex flex-column flex-md-row align-items-center justify-content-center gap-4 mb-3">
                <a href="../alarm/alarm.html" class="btn btn-outline-primary border-2 fs-2 customBtnFitur w-100 w-md-auto">ALARM</a>
                <a href="../stopwatch/stopwatch.html" class="btn btn-outline-primary border-2 fs-2 customBtnFitur w-100 w-md-auto">STOPWATCH</a>
                <a href="../timer/timer.html" class="btn btn-outline-primary border-2 fs-2 customBtnFitur w-100 w-md-auto">TIMER</a>
                <a href="../timezone-weathere/timezone-weather.html" class="btn btn-outline-primary border-2 fs-2 customBtnFitur w-100 w-md-auto">WEATHER</a>
            </div>
        </div>
    </main>

    <!-- footer -->
    <div id="footer-container">
        <!-- space untuk memasukkan footer -->
    </div>


    <!-- bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <script src="../navbar/navbar-digilog-logic.js"></script>
    <script href="../footer/footer-digilog-logic.js"></script>
    <script src="main-digilog-logic.js"></script>
</body>
</html>
