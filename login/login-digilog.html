<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Digilog</title>

    <!-- Link google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lilita+One&display=swap" rel="stylesheet">

    <!-- Link CDN Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Link CSS bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

    <!-- link unsplash -->
    <link rel="unsplash" href="https://source.unsplash.com/random">

    <!-- LINK CSS Style -->
    <link rel="stylesheet" href="login-digilog-style.css">
</head>
<body class="bg-light">

  <!-- transisi login to main digilog -->
  <div class="gate-left" id="gate-left"></div>
  <div class="gate-right" id="gate-right"></div>

  <div class="container d-flex justify-content-center align-items-center min-vh-100 animasi-login">
    <div id="login-page" class="card shadow p-4" style="max-width: 420px; width: 100%;">
      <!-- <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3YTczcmg5dDk4Z2I2NHgwcWYybHA3MTNqa3dlYWcwdms5dDh0ZjVubyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/tn8zWeNYA73G0/giphy.gif" alt="" srcset=""> -->
      <label for="username" class="greeting text-center">
        <h2 class="my-3 fs-1">H A L O ! 👋</h2>
      </label>

      <div class="username mb-3 my-2">
        <input type="text" id="username" class="form-control text-center fs-5" placeholder="Siapa namanya? (˶ˆᗜˆ˵)" required/>
      </div>

      <div id="checked-section" class="mb-3">
        <!-- anonymous login -->
        <div class="form-check mb-2 my-2">
            <input type="checkbox" class="form-check-input" id="anon-checked">
              <label class="form-check-label custom-checked" for="anon-checked">Log In as Anonymous</label>
            </div>

        <!-- remember me -->
        <div class="form-check">
            <input type="checkbox" class="form-check-input" id="remember-checked">
              <label class="form-check-label custom-checked" for="remember-checked">Always remember me</label>
        </div>
      </div>

      <div class="text-end">
        <button class="btn btn-primary fs-5" id="sendBtn">Send</button>
      </div>

      <!-- Custom Alert -->
        <div id="custom-alert" class="alert-overlay d-none">
            <div class="alert-box">
                <p id="alert-message">pesan untuk user</p>
            </div>
        </div>
    </div>
  </div>

  <footer class="fs-5 text-end me-1 pe-3">
    <p class="opacity-75"> &copy; bysabico</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
          crossorigin="anonymous"></script>
  <script src="login-digilog-logic.js"></script>
</body>
</html>
